name: Eval packs

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/**/llm/**/*.md'
      - 'evals/promptfooconfig.yaml'

permissions:
  contents: read
  pull-requests: write  # promptfoo-action posts a summary comment on the PR
  models: read          # GitHub Models inference via GITHUB_TOKEN

jobs:
  eval:
    name: Behavioural quality (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          persist-credentials: false

      - name: Run promptfoo evals
        uses: promptfoo/promptfoo-action@04839e664f52212b877170219dab0d7ad2bf6440 # v1.3.4
        # continue-on-error at step level — job exits 0 so the check stays green.
        # Eval results are posted as a PR comment regardless of pass/fail.
        # Promote specific tests to blocking by removing this once they show <5% flakiness.
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: evals/promptfooconfig.yaml
          prompts: 'packages/**/llm/**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
