name: Bootstrap Publish

# One-shot workflow to publish packs that don't yet exist on npm.
# Triggered manually from the Actions UI.
#
# For each pack in packages/ that returns 404 from the npm registry,
# this workflow attempts an OIDC-authenticated publish. If OIDC fails
# because the package has never existed (no trusted publisher configured),
# you'll see a 403 in the logs — in that case the pack needs a one-time
# manual `npm publish -w packages/<name> --access public` from a maintainer
# machine first.

on:
  workflow_dispatch:

permissions: {}

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      unpublished: ${{ steps.detect.outputs.unpublished }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect unpublished packs
        id: detect
        run: |
          pkgs=()
          for dir in packages/*/; do
            pkg="${dir%/}"
            pkg="${pkg#packages/}"
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/$pkg/latest")
            if [ "$code" = "404" ]; then
              echo "  unpublished: $pkg"
              pkgs+=("packages/$pkg")
            else
              echo "  exists: $pkg"
            fi
          done
          list=$(printf '%s\n' "${pkgs[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "unpublished=$list" >> "$GITHUB_OUTPUT"
          echo "Unpublished: $list"

  publish:
    needs: detect
    if: ${{ needs.detect.outputs.unpublished != '[]' && needs.detect.outputs.unpublished != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing to npm
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.detect.outputs.unpublished) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Publish ${{ matrix.path }}
        env:
          PKG_PATH: ${{ matrix.path }}
        run: npm publish -w "$PKG_PATH" --provenance --access public
