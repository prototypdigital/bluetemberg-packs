name: Bootstrap Publish

# Backfill workflow: publishes every pack in packages/ that doesn't yet exist
# on npm. Triggered manually from the Actions UI.
#
# OIDC trusted publishing CANNOT create a brand-new package name (npm/cli#8544),
# so the first publish of a pack must be token-authenticated. This job uses the
# NPM_TOKEN secret (which can create new names) and signs each publish with
# provenance. Once a pack exists on npm, its future releases flow through
# release-please.yml automatically. Re-running this workflow is a no-op for
# already-published packs (the detect job skips them).

on:
  workflow_dispatch:

permissions: {}

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      unpublished: ${{ steps.detect.outputs.unpublished }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Detect unpublished packs
        id: detect
        run: |
          pkgs=()
          for dir in packages/*/; do
            pkg="${dir%/}"
            pkg="${pkg#packages/}"
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/$pkg/latest")
            if [ "$code" = "404" ]; then
              echo "  unpublished: $pkg"
              pkgs+=("packages/$pkg")
            else
              echo "  exists: $pkg"
            fi
          done
          list=$(printf '%s\n' "${pkgs[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "unpublished=$list" >> "$GITHUB_OUTPUT"
          echo "Unpublished: $list"

  publish:
    needs: detect
    if: ${{ needs.detect.outputs.unpublished != '[]' && needs.detect.outputs.unpublished != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the OIDC token that signs npm provenance
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.detect.outputs.unpublished) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Provenance generation needs a current npm; the bundled one may be older.
      # Pin the major so a future npm release can't silently break publishing.
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Publish ${{ matrix.path }}
        env:
          PKG_PATH: ${{ matrix.path }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish -w "$PKG_PATH" --provenance --access public
